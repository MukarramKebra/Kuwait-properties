<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuwait Property Finder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
body { background: #0f0f0f; color: #fff; padding: 1rem; }
.app { max-width: 800px; margin: 0 auto; padding: 1rem 0; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #222; }
.logo { width: 40px; height: 40px; background: #1D9E75; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo svg { width: 22px; height: 22px; fill: white; }
.header-text h1 { font-size: 18px; font-weight: 500; }
.header-text p { font-size: 13px; color: #888; }
.search-bar { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.search-bar textarea { width: 100%; border: none; outline: none; resize: none; font-size: 15px; color: #fff; background: transparent; min-height: 52px; }
.search-bar textarea::placeholder { color: #555; }
.search-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
.quick-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { font-size: 12px; padding: 4px 10px; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #888; background: #1a1a1a; white-space: nowrap; }
.chip:hover { border-color: #1D9E75; color: #1D9E75; }
.send-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; cursor: pointer; font-weight: 500; }
.send-btn:disabled { opacity: 0.5; }
.filters { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
.filter-select { font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; }
.results-area { display: flex; flex-direction: column; gap: 1rem; }
.ai-bubble { background: #1a1a1a; border-radius: 12px; padding: 1rem 1.25rem; border: 1px solid #222; }
.ai-label { font-size: 12px; color: #1D9E75; font-weight: 500; margin-bottom: 6px; }
.ai-text { font-size: 14px; line-height: 1.6; }
.property-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; }
.property-card { background: #1a1a1a; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
.property-card:hover { border-color: #1D9E75; }
.prop-img { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 38px; background: #111; }
.prop-body { padding: 12px; }
.prop-price { font-size: 16px; font-weight: 500; }
.prop-price span { font-size: 12px; color: #888; font-weight: 400; }
.prop-title { font-size: 13px; color: #888; margin: 2px 0 6px; }
.prop-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: #0F3D2E; color: #1D9E75; }
.prop-location { font-size: 12px; color: #555; margin-top: 6px; }
.empty-state { text-align: center; padding: 2rem; color: #555; font-size: 14px; }
.section-label { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <div class="header-text">
      <h1>Kuwait Property Finder</h1>
      <p id="status-text">Connecting to live database...</p>
    </div>
  </div>
  <div class="search-bar">
    <textarea id="query" placeholder="e.g. 3-bedroom apartment in Salmiya under 450 KD, near the sea..."></textarea>
    <div class="search-actions">
      <div class="quick-chips">
        <span class="chip" onclick="fillChip('budget apartment under 300')">Budget apartment</span>
        <span class="chip" onclick="fillChip('luxury villa pool')">Luxury villa</span>
        <span class="chip" onclick="fillChip('studio expat furnished')">Studio</span>
        <span class="chip" onclick="fillChip('sea view family apartment')">Sea view family</span>
      </div>
      <button class="send-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="filters">
    <select class="filter-select" id="area">
      <option value="">All areas</option>
      <option>Salmiya</option><option>Kuwait City</option><option>Mishref</option>
      <option>Jabriya</option><option>Hawally</option><option>Fintas</option>
      <option>Rumaithiya</option><option>Mangaf</option>
    </select>
    <select class="filter-select" id="type">
      <option value="">Any type</option>
      <option>Apartment</option><option>Villa</option><option>Studio</option><option>Chalet</option>
    </select>
    <select class="filter-select" id="purpose">
      <option value="">Rent or buy</option><option>Rent</option><option>Buy</option>
    </select>
  </div>
  <div class="results-area" id="results">
    <div class="empty-state">Loading your live listings...</div>
  </div>
</div>
<script>
const SUPABASE_URL='https://qhebhvllkovfbkqrcnmm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZWJodmxsa292ZmJrcXJjbm1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTgwMTksImV4cCI6MjA5MTYzNDAxOX0.AQl5WAB1_ma3zcrkW4NFKk6oCKBUlTthD68ujcSlnas';
let PROPERTIES=[];

async function loadProperties(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/properties?select=*&order=id.asc',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(Array.isArray(data)&&data.length>0){
      PROPERTIES=data.map(p=>({...p,tags:p.tags?p.tags.split(','):[]}));
      document.getElementById('status-text').innerHTML='<span class="status-dot"></span>Live — '+PROPERTIES.length+' properties loaded';
      document.getElementById('results').innerHTML='<div class="empty-state">Describe your ideal property above to find matches</div>';
    } else {
      document.getElementById('status-text').textContent='Connected — no properties yet';
      document.getElementById('results').innerHTML='<div class="empty-state">No listings yet.</div>';
    }
  } catch(e){
    document.getElementById('status-text').textContent='Could not connect: '+e.message;
    document.getElementById('results').innerHTML='<div class="empty-state">Connection failed.</div>';
  }
}

function fillChip(t){document.getElementById('query').value=t;}

function smartSearch(query, properties){
  const q=query.toLowerCase();
  const words=q.split(/\s+/);
  const scored=properties.map(p=>{
    let score=0;
    const searchable=(p.title+' '+p.area+' '+p.type+' '+p.purpose+' '+(p.tags||[]).join(' ')+' '+p.beds+' bed').toLowerCase();
    words.forEach(w=>{
      if(w.length<2) return;
      if(searchable.includes(w)) score+=2;
      if(p.area&&p.area.toLowerCase().includes(w)) score+=3;
      if(p.type&&p.type.toLowerCase().includes(w)) score+=2;
      if(w==='studio'&&p.beds===0) score+=4;
      if((w==='villa')&&p.type==='Villa') score+=4;
      if((w==='apartment')&&p.type==='Apartment') score+=3;
      if(w==='sea'||w==='view') score+=(p.tags||[]).some(t=>t.toLowerCase().includes('sea')||t.toLowerCase().includes('view'))?3:0;
      if(w==='pool') score+=(p.tags||[]).some(t=>t.toLowerCase().includes('pool'))?3:0;
      if(w==='furnished') score+=(p.tags||[]).some(t=>t.toLowerCase().includes('furnished'))?3:0;
      if(w==='pet') score+=(p.tags||[]).some(t=>t.toLowerCase().includes('pet'))?3:0;
      if(w==='budget'||w==='cheap'||w==='affordable') score+=(p.tags||[]).some(t=>t.toLowerCase().includes('affordable'))?2:0;
      if(w==='luxury') score+=(p.type==='Villa'||p.beds>=4)?2:0;
      const numMatch=q.match(/(\d+)\s*(bed|bedroom|br)/);
      if(numMatch&&p.beds==parseInt(numMatch[1])) score+=5;
      const kdMatch=q.match(/under\s*(\d+)/);
      if(kdMatch){
        const maxPrice=parseInt(kdMatch[1]);
        const propPrice=parseInt((p.price||'').replace(/[^\d]/g,''));
        if(propPrice&&propPrice<=maxPrice) score+=4;
        else if(propPrice&&propPrice>maxPrice) score-=3;
      }
    });
    return{...p,score};
  });
  return scored.filter(p=>p.score>0).sort((a,b)=>b.score-a.score).slice(0,4);
}

function getAIMessage(query, results){
  if(results.length===0) return "I couldn't find properties matching your search. Try different keywords or remove some filters.";
  const areas=[...new Set(results.map(p=>p.area))].join(' and ');
  const types=[...new Set(results.map(p=>p.type))].join(', ');
  return `I found ${results.length} propert${results.length===1?'y':'ies'} matching your search in ${areas}. Here are the best matches for you!`;
}

function doSearch(){
  const q=document.getElementById('query').value.trim();
  const area=document.getElementById('area').value;
  const type=document.getElementById('type').value;
  const purpose=document.getElementById('purpose').value;
  if(!q&&!area&&!type&&!purpose) return;

  let filtered=PROPERTIES;
  if(area) filtered=filtered.filter(p=>p.area===area);
  if(type) filtered=filtered.filter(p=>p.type===type);
  if(purpose) filtered=filtered.filter(p=>p.purpose===purpose);

  const matched=q?smartSearch(q,filtered):filtered.slice(0,4);
  const message=getAIMessage(q,matched);

  let html='<div class="ai-bubble"><div class="ai-label">AI Assistant</div><div class="ai-text">'+message+'</div></div>';
  if(matched.length>0){
    html+='<div><div class="section-label">'+matched.length+' properties found</div><div class="property-grid">';
    matched.forEach(p=>{
      html+='<div class="property-card"><div class="prop-img">'+(p.emoji||'🏢')+'</div><div class="prop-body"><div class="prop-price">'+p.price+' <span>'+(p.period||'')+'</span></div><div class="prop-title">'+p.title+'</div><div class="prop-tags">'+(p.tags||[]).map(t=>'<span class="tag">'+t.trim()+'</span>').join('')+'</div><div class="prop-location">'+p.area+' · '+(p.beds?p.beds+' bed':'Studio')+' · '+p.sqm+' m²</div></div></div>';
    });
    html+='</div></div>';
  } else {
    html+='<div class="empty-state">No matches found — try different keywords or remove filters</div>';
  }
  document.getElementById('results').innerHTML=html;
}

document.getElementById('query').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSearch();}
});

loadProperties();
</script>
</body>
</html>
