<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuwait Property Finder</title>
<style>
/* --- GitHub-Friendly Theme & Variables --- */
:root {
  --primary: #1D9E75;
  --primary-hover: #147a5a;
  --like-red: #ff4757;
  --bg-sand: #fcf9f2;
  --text-dark: #2d3436;
  --glass: rgba(255, 255, 255, 0.92);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
body { background: var(--bg-sand); color: var(--text-dark); }

/* --- Full Screen Hero with Smooth Transition --- */
.hero {
  min-height: 100vh; /* Starts full screen */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 2rem;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1400&q=80') center/cover no-repeat fixed;
  transition: min-height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: center;
}

/* Shrink class applied via JS when searching */
.hero.active { min-height: 40vh; }

.brand-h1 { 
  font-size: clamp(2rem, 5vw, 3.5rem); 
  font-weight: 900; 
  color: white; 
  text-transform: uppercase;
  margin-bottom: 1rem;
  letter-spacing: -1px;
}

/* --- The Search Bar (Glassmorphism) --- */
.search-container {
  width: 100%;
  max-width: 700px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  transform: translateY(0);
  transition: transform 0.3s ease;
}

.search-container:focus-within { transform: translateY(-5px); }

textarea {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 1.1rem;
  outline: none;
  resize: none;
  height: 50px;
  color: #1a1a1a;
}

/* --- Like Button & Properties --- */
.property-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 25px;
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  opacity: 0; /* Starts hidden for animation */
  transform: translateY(30px);
}

/* Like Heart CSS */
.like-trigger {
  position: absolute;
  top: 15px;
  right: 15px;
  background: white;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  z-index: 10;
  transition: all 0.2s ease;
}

.like-trigger svg { fill: #ccc; width: 20px; height: 20px; transition: fill 0.3s ease; }
.like-trigger.is-liked svg { fill: var(--like-red); }
.like-trigger:hover { transform: scale(1.15); }

/* Animation trigger */
.show-card {
  animation: slideUp 0.6s forwards cubic-bezier(0, 0, 0.2, 1);
}

@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}

.btn-main {
  background: var(--primary);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

.btn-main:hover { background: var(--primary-hover); transform: scale(1.02); }
</style>
</head>
<body>

<div class="hero" id="heroSection">
  <h1 class="brand-h1">KUWAIT PROPERTY FINDER</h1>
  <div class="search-container">
    <textarea id="userInput" placeholder="Search Salmiya, Hawally, or 3-bedroom villas..."></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
      <p style="font-size:12px; color:#666;">Try "Studio in Hawally"</p>
      <button class="btn-main" onclick="executeSearch()">Find Home</button>
    </div>
  </div>
</div>

<div id="resultsArea"></div>

<script>
// Logic to handle "Likes" and Smooth Transitions
let likedIDs = JSON.parse(localStorage.getItem('fav_homes') || '[]');

function executeSearch() {
  const hero = document.getElementById('heroSection');
  const results = document.getElementById('resultsArea');
  
  // 1. Trigger Hero Shrink
  hero.classList.add('active');
  
  // 2. Clear previous results with a quick fade
  results.style.opacity = '0';
  
  setTimeout(() => {
    // 3. Render New Results (Mock Data for example)
    const mockData = [
      { id: 101, title: 'Luxury Villa', area: 'Mishref', price: '1,200 KD', img: 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=600' },
      { id: 102, title: 'Sea View Flat', area: 'Salmiya', price: '450 KD', img: 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=600' },
      { id: 103, title: 'Modern Studio', area: 'Hawally', price: '220 KD', img: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=600' }
    ];

    let html = `<div class="property-grid">`;
    mockData.forEach((p, index) => {
      const likedClass = likedIDs.includes(p.id) ? 'is-liked' : '';
      html += `
        <div class="card show-card" style="animation-delay: ${index * 0.15}s">
          <button class="like-trigger ${likedClass}" onclick="handleLike(event, ${p.id})">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          </button>
          <div style="height:200px; background:url('${p.img}') center/cover"></div>
          <div style="padding:20px;">
            <h2 style="font-size:22px; color:var(--primary);">${p.price}</h2>
            <p style="font-weight:600; margin:5px 0;">${p.title}</p>
            <p style="color:#888; font-size:14px;">📍 ${p.area}</p>
          </div>
        </div>
      `;
    });
    html += `</div>`;
    
    results.innerHTML = html;
    results.style.opacity = '1';
  }, 400); // Small delay to allow hero animation to start
}

function handleLike(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const idx = likedIDs.indexOf(id);
  
  if (idx > -1) {
    likedIDs.splice(idx, 1);
    btn.classList.remove('is-liked');
  } else {
    likedIDs.push(id);
    btn.classList.add('is-liked');
  }
  localStorage.setItem('fav_homes', JSON.stringify(likedIDs));
}
</script>
</body>
</html>
